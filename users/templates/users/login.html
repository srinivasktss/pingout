{% extends "users/base.html" %}

{% block title %}Login · Pingout{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Welcome back</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p class="auth-switch">
        Don't have an account? <a href="{% url 'users:register' %}">Register</a>
    </p>
</div>
{% endblock %}
