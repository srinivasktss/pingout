{% extends "users/base.html" %}
{% load static %}

{% block title %}Register · Pingout{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Create an account</h1>

    <ul id="register-errors" class="errorlist" hidden>
        <li id="register-error-message"></li>
    </ul>

    <form id="register-form" method="post" data-redirect-url="{% url 'users:home' %}">
        {% csrf_token %}

        <p>
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" required>
        </p>
        <p>
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" required>
        </p>
        <p>
            <label for="id_password1">Password</label>
            <input type="password" name="password1" id="id_password1" required>
        </p>
        <p>
            <label for="id_password2">Confirm password</label>
            <input type="password" name="password2" id="id_password2" required>
        </p>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p class="auth-switch">
        Already have an account? <a href="{% url 'users:login' %}">Login</a>
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'users/js/register.js' %}"></script>
{% endblock %}
